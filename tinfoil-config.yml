cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: "container"
    image: "ghcr.io/tinfoilsh/system-prompt-injector@sha256:fd39017af20134c5eb862e302bcd13d7c07fc7de8103bb6d0bed349e0793507c" # v0.0.16
    env:
      - TINFOIL_INFERENCE_URL: "https://inference.tinfoil.sh"
    secrets:
      - SYSTEM_PROMPT_TEMPLATE

shim:
  upstream-port: 8080
  paths:
    - /healthz
    - /v1/chat/completions
